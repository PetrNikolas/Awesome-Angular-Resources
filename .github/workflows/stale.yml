# This workflow warns and then closes inactive catalog issues and pull requests.
name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '39 3 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This catalog issue is stale because it has had no recent activity.'
          stale-pr-message: 'This catalog contribution is stale because it has had no recent activity.'
          stale-issue-label: 'no-issue-activity'
          stale-pr-label: 'no-pr-activity'
