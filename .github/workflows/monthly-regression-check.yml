name: Monthly regression check

on:
  schedule:
    - cron: '0 21 1-7 * 5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regression-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Inspect available measurements
        run: |
          echo "Hledám benchmarky, trasy, časování nebo flame grafy..."
          find . \
            -path './node_modules' -prune -o \
            -type f \( \
              -iname '*benchmark*' -o \
              -iname '*bench*' -o \
              -iname '*trace*' -o \
              -iname '*timing*' -o \
              -iname '*flame*' \
            \) -print

      - name: Run lint
        run: yarn lint

      - name: Run build
        run: yarn build

      - name: Create report
        run: |
          mkdir -p reports
          cat > reports/regression-check.md <<'EOF'
          # Regression check

          Zadání:

          Porovnej nedávné změny s benchmarky nebo trasami a včas označ zhoršení.

          Pravidla pro podložení tvrzení:

          - Tvrzení opírej o měřitelné signály: benchmarky, trasy, časování, flame grafy.
          - Pokud měření nejsou k dispozici, uveď: „Nebyla nalezena žádná měření“.
          - Nevytvářej další worktree.
          - Vycházej z hlavní větve master.
          EOF

      - name: Create pull request if report changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/monthly-regression-check
          base: master
          title: Monthly regression check
          commit-message: Add monthly regression check report
          body: |
            Automated monthly regression check.

            The report compares recent changes against available measurable signals.
            If no benchmark, trace, timing, or flame graph data is available, the report must say:
            „Nebyla nalezena žádná měření“.
